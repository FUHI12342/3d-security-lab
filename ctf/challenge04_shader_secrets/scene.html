<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>CTF Challenge 04 - Shader Secrets</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #080818; }
    canvas { display: block; }
    #hud {
      position: absolute; top: 10px; left: 10px;
      color: #88ccff; font-family: monospace; font-size: 11px;
      background: rgba(0,0,0,0.7); padding: 10px; border-radius: 4px;
    }
  </style>
</head>
<body>
  <div id="hud">CTF Challenge 04 — シェーダーの秘密を探せ</div>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script>
    'use strict';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x080818);

    const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 100);
    camera.position.set(0, 0, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    // シークレットを埋め込んだカスタムシェーダーマテリアル
    // u_secret uniform に FLAG が含まれる
    const secretMat = new THREE.ShaderMaterial({
      uniforms: {
        u_time:   { value: 0.0 },
        // CTF Challenge 04 フラグ: この uniform 値を見つけよ
        u_secret: { value: 'FLAG{shader_secret_Xk9mP2rQ}' },
        u_color:  { value: new THREE.Color(0x4488ff) },
      },
      vertexShader: `
        // Vertex shader - Security Lab CTF Challenge 04
        uniform float u_time;
        varying vec2 vUv;
        varying float vWave;

        void main() {
          vUv = uv;
          vec3 pos = position;
          // 波形アニメーション
          vWave = sin(pos.x * 3.0 + u_time) * 0.2;
          pos.z += vWave;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
        }
      `,
      fragmentShader: `
        // Fragment shader
        // u_secret: FLAG{shader_secret_Xk9mP2rQ}
        uniform vec3 u_color;
        uniform float u_time;
        varying vec2 vUv;
        varying float vWave;

        void main() {
          float brightness = 0.5 + vWave * 2.0;
          vec3 col = u_color * brightness;
          col += vec3(vUv.x * 0.2, vUv.y * 0.1, 0.3);
          gl_FragColor = vec4(col, 1.0);
        }
      `,
    });

    const geometry = new THREE.TorusKnotGeometry(1.2, 0.4, 128, 32);
    const mesh = new THREE.Mesh(geometry, secretMat);
    scene.add(mesh);

    let t = 0;
    function animate() {
      requestAnimationFrame(animate);
      t += 0.016;
      secretMat.uniforms.u_time.value = t;
      mesh.rotation.y = t * 0.3;
      mesh.rotation.x = t * 0.1;
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
